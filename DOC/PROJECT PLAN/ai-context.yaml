version: 1
project:
  name: Agency SaaS Website
  type: project-specific orchestration root
  summary: >-
    Canonical AI entrypoint for the generated project-specific documentation set.
    This file routes implementation and later planning tasks to the correct
    project artifacts after the universal role orchestration has completed.
  status: implementation-ready documentation root
  canonical_docs_root: DOC/PROJECT PLAN/
  canonical_ai_entrypoint: DOC/PROJECT PLAN/ai-context.yaml
  canonical_human_index: DOC/PROJECT PLAN/README.md

documentation_workflow:
  generation_entrypoint: DOC/Universal/Prompts/master_orchestration_prompt.md
  source_plan: DOC/MASTER PLAN/Plan.md
  universal_inputs:
    - DOC/Universal/GPT ROLES/ai-context.yaml
    - DOC/Universal/GPT ROLES/Documentation_Workflow_Playbook.md
    - DOC/Universal/Execution Constitution.md
  generation_result: >-
    A complete project-specific documentation system must exist under
    DOC/PROJECT PLAN/ before implementation begins.

execution_workflow:
  start_here_for_build: true
  minimum_instruction: >-
    Start with DOC/PROJECT PLAN/ai-context.yaml. Read the shared contracts first,
    then route to the role-specific project folder required by the current task.
    Do not return to the universal prompt for implementation work.
  implementation_gate:
    - Shared Contracts must exist
    - Frontend, Backend, API and Data, Security, DevOps, and QA docs must exist
    - QA and Security constraints must be treated as release gates, not optional notes

core_invariants:
  - Shared Contracts are the cross-role source of truth.
  - Project-specific docs override universal defaults when explicitly defined.
  - Implementation must follow project-specific docs, not ad hoc assumptions.
  - Contract changes must be reflected in affected docs before further feature buildout.
  - AI must use this file as the primary routing file once documentation generation is complete.

project_layers:
  universal_layer:
    purpose: reusable prompts, roles, and rules
    paths:
      - DOC/Universal/Prompts/
      - DOC/Universal/GPT ROLES/
      - DOC/Universal/Execution Constitution.md
  role_layer:
    purpose: orchestrated documentation-generation workers
    entrypoint: DOC/Universal/GPT ROLES/ai-context.yaml
  project_specific_layer:
    purpose: this project's implementation-ready documentation
    root: DOC/PROJECT PLAN/

project_docs:
  shared_contracts:
    ai_entry: DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Shared Contracts/README.md
    use_for:
      - domain entities
      - route and surface boundaries
      - role and permission model
      - integration ownership
  frontend:
    ai_entry: DOC/PROJECT PLAN/Frontend/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Frontend/README.md
    use_for:
      - page planning
      - design system
      - UI components
      - frontend feature implementation
  backend:
    ai_entry: DOC/PROJECT PLAN/Backend/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Backend/README.md
    use_for:
      - service architecture
      - domain logic
      - integrations
      - backend feature implementation
  api_and_data:
    ai_entry: DOC/PROJECT PLAN/API and Data/ai-context.yaml
    human_index: DOC/PROJECT PLAN/API and Data/README.md
    use_for:
      - API endpoints
      - payload contracts
      - event flows
      - schema and persistence rules
  security:
    ai_entry: DOC/PROJECT PLAN/Security/ai-context.yaml
    human_index: DOC/PROJECT PLAN/Security/README.md
    use_for:
      - auth and authorization
      - privacy and compliance
      - abuse protection
  devops:
    ai_entry: DOC/PROJECT PLAN/DevOps/ai-context.yaml
    human_index: DOC/PROJECT PLAN/DevOps/README.md
    use_for:
      - environments
      - CI/CD
      - observability
      - rollout and rollback
  qa:
    ai_entry: DOC/PROJECT PLAN/QA/ai-context.yaml
    human_index: DOC/PROJECT PLAN/QA/README.md
    use_for:
      - test strategy
      - release gates
      - end-to-end validation

read_paths:
  understand_project:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/README.md
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
  implement_frontend:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Frontend/ai-context.yaml
  implement_backend:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Backend/ai-context.yaml
    - DOC/PROJECT PLAN/API and Data/ai-context.yaml
  harden_security:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/Shared Contracts/ai-context.yaml
    - DOC/PROJECT PLAN/Security/ai-context.yaml
  release_project:
    - DOC/PROJECT PLAN/ai-context.yaml
    - DOC/PROJECT PLAN/DevOps/ai-context.yaml
    - DOC/PROJECT PLAN/QA/ai-context.yaml
