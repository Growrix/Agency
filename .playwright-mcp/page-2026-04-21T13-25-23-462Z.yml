        - article [ref=e94]:
          - generic [ref=e95]:
            - paragraph [ref=e96]: After a year of shipping MCP servers for B2B operations, fintech, and content teams, a clear shape has emerged for what production looks like. It rarely matches the demos.
            - paragraph [ref=e97]: The temptation is to wrap every API endpoint as a tool and ship. Real deployments need a layer of design discipline first — otherwise the agent calls the wrong tool, hallucinates arguments, or quietly burns through your rate limits.
            - heading "Tool design is the product" [level=2] [ref=e98]
            - paragraph [ref=e99]: Before any code, we list every tool we plan to expose, write a one-sentence description in plain English, and stress-test the names against likely agent queries. If two tools could plausibly answer the same prompt, we collapse them.
            - list [ref=e100]:
              - listitem [ref=e101]: One job per tool — never overload arguments to do two things
              - listitem [ref=e102]: Names should be verbs from the agent's point of view
              - listitem [ref=e103]: Argument shapes should be the smallest viable input
              - listitem [ref=e104]: Errors should be readable strings, not stack traces
            - heading "Auth is rarely optional" [level=2] [ref=e105]
            - paragraph [ref=e106]: Even internal MCP servers should support a per-user identity. The pattern that's worked best for us is short-lived signed tokens minted by the host application, validated at the MCP boundary, and translated into the downstream credentials each tool needs.
            - code [ref=e108]: "server.tool(\"list_invoices\", { description: \"List invoices for the signed-in customer\", input: z.object({ status: z.enum([\"open\", \"paid\"]).optional() }), handler: async ({ input, ctx }) => { const customer = await requireCustomer(ctx); return billing.invoices.list({ customer: customer.id, ...input }); }, });"
            - heading "Observability you'll actually open" [level=2] [ref=e109]
            - paragraph [ref=e110]: "Every tool call should be logged with: tool name, hashed user identity, input shape, latency, result kind, and a request id you can grep. We pipe these to a single dashboard with three charts — calls per tool, error rate, p95 latency — and almost never need more."
            - blockquote [ref=e111]:
              - paragraph [ref=e112]: If you can't answer 'which tool does the agent call most often, and how fast' in under ten seconds, the server isn't done.
              - generic [ref=e113]: — Internal Growrix OS Ops playbook
            - heading "What we're working on next" [level=2] [ref=e114]
            - paragraph [ref=e115]: We're prototyping a small library that lets a single MCP server expose different toolsets per audience — staff, customer, anonymous — without forking the server. More on that soon.
