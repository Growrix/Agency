    /* ==========================================================================
       DESIGN TOKENS
       Breakpoints (min-width): sm 640px | md 768px | lg 1024px | xl 1280px | 2xl 1536px

    :root {
      --color-primary: #4f46e5;
      --color-primary-hover: #4338ca;
      --color-primary-active: #3730a3;
      --color-primary-soft: #eef2ff;

      --color-surface-2: #f1f5f9;
      --color-text: #0f172a;
      --color-text-muted: #475569;

      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-12: 3rem;
      --space-16: 4rem;
      --space-24: 6rem;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --shadow-sm: 0 1px 2px rgb(15 23 42 / 0.06);

      --container-max: 72rem;

      --duration-fast: 150ms;

      --duration-slow: 400ms;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);

    }

    [data-theme="dark"] {
      --color-primary: #818cf8;
      --color-primary-hover: #a5b4fc;

      --color-border: #243049;

      --shadow-md: 0 4px 12px rgb(0 0 0 / 0.5);
      --shadow-lg: 0 12px 32px rgb(0 0 0 / 0.55);
      --shadow-xl: 0 24px 60px rgb(0 0 0 / 0.6);
    }

    /* ==========================================================================
       RESET / BASE
       ========================================================================== */
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }
    body {
      font-family: var(--font-sans);
      font-size: var(--text-body);
      line-height: var(--leading-normal);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
    }
    img, svg, video { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; color: inherit; }
    h1, h2, h3, h4 { line-height: var(--leading-tight); font-family: var(--font-display); }
    a { color: var(--color-primary); }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-radius: var(--radius-sm);
    }

    /* ==========================================================================
       UTILITIES
       ========================================================================== */
    .container {
      width: min(100% - 2 * var(--space-4), var(--container-max));
      margin-inline: auto;
    }
    .visually-hidden {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
      border: 0;
    }
    .skip-link {
      position: absolute;
      top: var(--space-2); left: var(--space-2);
      z-index: 100;
      padding: var(--space-2) var(--space-4);
      background: var(--color-primary);
      color: #fff;
      border-radius: var(--radius-md);
      text-decoration: none;
      transform: translateY(-200%);
      transition: transform var(--duration-fast) var(--ease-out);
    }
    .skip-link:focus { transform: none; }

    /* Scroll reveal */
    [data-reveal] {
      opacity: 0;
      transform: translateY(var(--reveal-distance));
      transition: opacity var(--duration-slow) var(--ease-out), transform var(--duration-slow) var(--ease-out);
    }
    [data-reveal].is-revealed { opacity: 1; transform: none; }
    [data-reveal-delay="1"] { transition-delay: 100ms; }
    [data-reveal-delay="2"] { transition-delay: 200ms; }
    [data-reveal-delay="3"] { transition-delay: 300ms; }
    @media (prefers-reduced-motion: reduce) {
      [data-reveal] { opacity: 1; transform: none; transition: none; }

      border-radius: var(--radius-md);
      font-weight: var(--font-semibold);
      font-size: var(--text-body);

      cursor: pointer;
      transition: background-color var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn--primary { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { background: var(--color-primary-hover); }

    .btn--secondary { background: transparent; color: var(--color-text); border-color: var(--color-border); }
    .btn--secondary:hover { background: var(--color-surface); }

  <script>
    (function () {
      'use strict';

      /* Apply persisted/system theme before first paint of interactive UI */
      function applyInitialTheme() {
        var stored = null;
        try { stored = localStorage.getItem('theme'); } catch (e) { /* storage unavailable */ }
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      }
      applyInitialTheme();

      function initThemeToggle() {
        var toggle = document.querySelector('.theme-toggle');
        if (!toggle) return;
        function sync() {
          var dark = document.documentElement.getAttribute('data-theme') === 'dark';
          toggle.setAttribute('aria-pressed', String(dark));
          toggle.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
        }
        toggle.addEventListener('click', function () {
          var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) { /* storage unavailable */ }
          sync();
        });
        sync();
      }

      function initNav() {
        var toggle = document.querySelector('.nav__toggle');
        var menu = document.querySelector('.nav__menu');
        if (!toggle || !menu) return;
        function close() {
          toggle.setAttribute('aria-expanded', 'false');
          menu.classList.remove('is-open');
          toggle.focus();
        }
        toggle.addEventListener('click', function () {
          var open = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', String(!open));
          menu.classList.toggle('is-open', !open);
        });
        menu.addEventListener('click', function (e) {
          if (e.target.closest('a')) {
            toggle.setAttribute('aria-expanded', 'false');
            menu.classList.remove('is-open');
          }
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && toggle.getAttribute('aria-expanded') === 'true') close();
        });
      }

      function initScrollReveal() {
        var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var els = document.querySelectorAll('[data-reveal]');
        if (reduced || !('IntersectionObserver' in window)) {
          els.forEach(function (el) { el.classList.add('is-revealed'); });
          return;
        }
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-revealed');
              io.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15, rootMargin: '0px 0px -10% 0px' });
        els.forEach(function (el) { io.observe(el); });
      }

      function init() {
        initThemeToggle();
        initNav();
        initScrollReveal();
        /* Add per-component initializers here: initForms(), initTabs(), initCounters(), ... */
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
