name: Studio CI

on:
  push:
    branches:
      - main
      - CMS
    paths:
      - 'studio/**'
      - '.github/workflows/studio.yml'
  pull_request:
    paths:
      - 'studio/**'
      - '.github/workflows/studio.yml'

jobs:
  studio-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: studio

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studio/package-lock.json

      - name: Install Studio dependencies
        run: npm ci

      - name: Build Studio
        run: npm run build